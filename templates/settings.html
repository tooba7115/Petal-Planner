<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessibility – My Planner</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='contact_style.css') }}">

</head>

<body>
    <header class="header">
        <nav class="nav">
            <a href="/dashboard" class="brand">
                <span class="brand-avatar">{{ current_user.avatar_emoji }}</span>
                <span class="brand-text">My Planner</span>
            </a>
            <div class="nav-left">
                <a href="/dashboard" class="nav-link">Home</a>
                <a href="/create" class="nav-link">Create Task</a>
                <a href="/history" class="nav-link">History</a>
            </div>
            
            <div class="nav-right">
                <span class="user-badge">👋 {{ current_user.username }}</span>
            </div>
        </nav>
    </header>
    
    <main class="contact-page">
        <div class="contact-card">
            <h2 class="contact-title">♿ Accessibility Settings</h2>
            <p class="contact-subtitle">Customize the planner to suit your needs.</p>
            
            
            <!-- THEME -->
             <div class="accessibility-section">

                <label>Theme</label>

                <div class="accessibility-options">
                    <button onclick="applyTheme('light')" class="access-btn">☀ Light</button>
                    <button onclick="applyTheme('dark')" class="access-btn">🌙 Dark</button>
                </div>

                </div>


                <div class="accessibility-section">

                <label>Contrast</label>

                <div class="accessibility-options">
                    <button onclick="setContrast('normal')" class="access-btn">Normal</button>
                    <button onclick="setContrast('high')" class="access-btn">High</button>
                </div>

                </div>


                <div class="accessibility-section">

                <label>Text Size</label>

                <div class="accessibility-options">
                    <button onclick="setTextSize('small')" class="access-btn">A-</button>
                    <button onclick="setTextSize('medium')" class="access-btn">A</button>
                    <button onclick="setTextSize('large')" class="access-btn">A+</button>
                </div>

                </div>


                <div class="accessibility-section">

                <label>Motion</label>

                <div class="accessibility-options">
                    <button onclick="setMotion('normal')" class="access-btn">Normal</button>
                    <button onclick="setMotion('reduce')" class="access-btn">Reduce</button>
                </div>

                </div>
        
        </div>
    
    </main>
    
    <footer class="footer">
        
        <div class="footer-center">
            <div class="footer-left">
                
                <p>© 2025 My Planner</p>
                <span>Made with ☕ & ✨</span>
            </div>
            
            <div class="footer-links">
                <a href="/about">About</a>
                <a href="/privacy">Privacy</a>
                <a href="/contact">Contact</a>
            </div>

        </div>

    </footer>
    
    <script src="{{ url_for('static', filename='accessibility.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>

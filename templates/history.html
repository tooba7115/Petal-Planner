<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History - Planner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='contact_style.css') }}">
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

<header class="header">
  <nav class="nav">

    <a href="{{ url_for('profile') }}" class="brand">
      <span class="brand-avatar">
        {% if current_user.is_authenticated %}
          {{ current_user.avatar_emoji }}
        {% else %}
          👤
        {% endif %}
      </span>
      <span class="brand-text">My Planner</span>
    </a>

    <div class="nav-left">
      <a href="/dashboard" class="nav-link">Home</a>
      <a href="/create" class="nav-link">Create Task</a>
      <a href="/history" class="nav-link active">History</a>
    </div>

    <div class="nav-right">
      <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        🌙
      </button>

      <a href="https://www.instagram.com/tooba.__.07" class="social" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://www.tiktok.com" class="social" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-tiktok"></i>
      </a>
      <a href="https://github.com/tooba7115" class="social" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-github"></i>
      </a>

      <div class="hamburger-menu">
        <button class="hamburger-btn" onclick="toggleMenu()">☰</button>

        <div class="dropdown-menu" id="dropdownMenu">
          <div class="dropdown-user">
            👋 {{ current_user.username }}
          </div>

          <a href="/profile" class="dropdown-item">
            ⚙️ Profile Settings
          </a>

          <a href="/logout" class="dropdown-item logout">
            🚪 Logout
          </a>
        </div>
      </div>

    </div>
  </nav>
</header>

<main class="dashboard">
  <div class="dashboard-wrapper">
    <h2 class="dashboard-title">History</h2>
    <p class="completion-stats">
      You completed <strong id="completion-count">0</strong> tasks 🎉
    </p>

    <div class="sticky-grid" id="history-grid">
      <!-- Completed sticky notes go here -->
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-center">
    <div class="footer-left">
      <p>© 2025 My Planner</p>
      <span>Made with ☕ & ✨</span>
    </div>

    <div class="footer-links">
      <a href="/about">About</a>
      <a href="/privacy">Privacy</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</footer>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>renderHistory();</script>
</body>
</html>
